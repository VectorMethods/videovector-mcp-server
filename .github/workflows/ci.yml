name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:
  node:
    name: Node checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: npm run verify

      - name: Runtime dependency audit
        run: npm audit --omit=dev --audit-level=high

      - name: Pack dry run
        run: npm pack --dry-run

  docker:
    name: Docker build and health smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t videovector-mcp-server:ci .

      - name: Start HTTP server
        run: |
          docker run --rm -d \
            --name videovector-mcp-server-ci \
            -p 8080:8080 \
            -e MCP_TRANSPORT_MODE=http \
            -e VIDEOVECTOR_BASE_URL=https://api.vectormethods.com/api/v2 \
            videovector-mcp-server:ci

      - name: Smoke health endpoint
        run: |
          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:8080/health; then
              exit 0
            fi
            sleep 1
          done
          docker logs videovector-mcp-server-ci
          exit 1

      - name: Stop HTTP server
        if: always()
        run: docker stop videovector-mcp-server-ci || true

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
