name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  node:
    name: Node checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "20.20.2"
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Verify
        run: npm run verify

      - name: Full dependency audit
        run: npm audit --audit-level=high

      - name: Pack dry run
        run: npm pack --dry-run

  docker:
    name: Docker build and health smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Build image
        run: |
          set -euo pipefail
          sentinel='credential-sentinel-must-never-enter-image'
          printf '%s\n' "$sentinel" > gha-creds-ci-sentinel.json
          trap 'rm -f gha-creds-ci-sentinel.json' EXIT
          docker build -t videovector-mcp-server:ci .
          container_id="$(docker create videovector-mcp-server:ci)"
          trap 'rm -f gha-creds-ci-sentinel.json; docker rm -f "$container_id" >/dev/null 2>&1 || true' EXIT
          docker export "$container_id" -o /tmp/videovector-mcp-filesystem.tar
          forbidden_paths="$(tar -tf /tmp/videovector-mcp-filesystem.tar |
            grep -Ei '(^|/)(gha-creds[^/]*\.json|.*service[-_]?account[^/]*\.json|\.env(\.[^/]*)?|\.npmrc|.*\.(pem|p12|pfx|key))$' || true)"
          unexpected_paths="$(printf '%s\n' "$forbidden_paths" |
            grep -Ev '^usr/local/lib/node_modules/npm/\.npmrc$' || true)"
          if [[ -n "$unexpected_paths" ]]; then
            printf '%s\n' "$unexpected_paths" >&2
            echo "Credential-pattern filename entered the image." >&2
            exit 1
          fi
          docker run --rm videovector-mcp-server:ci \
            sh -c 'test ! -s /usr/local/lib/node_modules/npm/.npmrc'
          if grep -aF "$sentinel" /tmp/videovector-mcp-filesystem.tar; then
            echo "Credential sentinel entered the image." >&2
            exit 1
          fi

      - name: Start HTTP server
        run: |
          docker run --rm -d \
            --name videovector-mcp-server-ci \
            -p 8080:8080 \
            -e MCP_TRANSPORT_MODE=http \
            -e VIDEOVECTOR_BASE_URL=https://api.vectormethods.com/api/v2 \
            videovector-mcp-server:ci

      - name: Smoke health endpoint
        run: |
          for _attempt in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:8080/health; then
              exit 0
            fi
            sleep 1
          done
          docker logs videovector-mcp-server-ci
          exit 1

      - name: Stop HTTP server
        if: always()
        run: docker stop videovector-mcp-server-ci || true

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "20.20.2"
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Full dependency audit
        run: npm audit --audit-level=high

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Scan history and filesystem with checksum-pinned Gitleaks
        run: |
          set -euo pipefail
          mkdir -m 0700 /tmp/gitleaks
          curl --proto '=https' --tlsv1.2 --retry 3 --retry-all-errors -fsSLo /tmp/gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz
          echo '9991e0b2903da4c8f6122b5c3186448b927a5da4deef1fe45271c3793f4ee29c  /tmp/gitleaks.tar.gz' | sha256sum --check -
          tar --no-same-owner -xzf /tmp/gitleaks.tar.gz -C /tmp/gitleaks gitleaks
          test -f /tmp/gitleaks/gitleaks
          test ! -L /tmp/gitleaks/gitleaks
          echo 'e18325d568268b6efb6cd0cc721f8bea5667f4cd1c8d03618ab61987f41269ad  /tmp/gitleaks/gitleaks' | sha256sum --check -
          test "$(/tmp/gitleaks/gitleaks version)" = "8.24.3"
          /tmp/gitleaks/gitleaks git --no-banner --redact --log-opts=--all .
          /tmp/gitleaks/gitleaks dir --no-banner --redact .
