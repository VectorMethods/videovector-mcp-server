name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Bot-created release tag, for example videovector-mcp-v2.0.2"
        required: true
        type: string
      release_body_sha256:
        description: "SHA-256 of the scanned release body held by vectormethods-public-bot"
        required: true
        type: string
      expected_target_sha:
        description: "Exact commit SHA peeled from the immutable bot-created release tag"
        required: true
        type: string

run-name: Release ${{ inputs.release_tag }}

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.release_tag }}
  cancel-in-progress: false

env:
  MCP_NAME: io.github.VectorMethods/videovector-mcp-server
  MCP_REGISTRY_NAME: io.github.VectorMethods/videovector-mcp-server
  NPM_PACKAGE: "@vectormethods/videovector-mcp-server"
  GHCR_IMAGE: ghcr.io/vectormethods/videovector-mcp-server
  SKOPEO_IMAGE: quay.io/skopeo/stable@sha256:47853bb9fb24202af9110531ebd6e43c5f97701254ca290596640290d17942f4

jobs:
  guard:
    name: Validate bot release request
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      source_sha: ${{ steps.validate.outputs.source_sha }}
      version: ${{ steps.validate.outputs.version }}

    steps:
      - name: Checkout release tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: refs/tags/${{ inputs.release_tag }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24.14.0"
          package-manager-cache: false

      - name: Validate actor and immutable release ref
        id: validate
        env:
          EXPECTED_TARGET_SHA: ${{ inputs.expected_target_sha }}
          RELEASE_BODY_SHA256: ${{ inputs.release_body_sha256 }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          RELEASE_TAG_PREFIX: videovector-mcp-v
        run: |
          set -euo pipefail
          bash scripts/validate_release_request.sh

      - name: Validate release metadata
        env:
          RELEASE_VERSION: ${{ steps.validate.outputs.version }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');
          const version = process.env.RELEASE_VERSION;
          const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const server = JSON.parse(fs.readFileSync('server.json', 'utf8'));
          if (!/^[0-9]+\.[0-9]+\.[0-9]+(?:[a-z0-9.-]+)?$/.test(version)) {
            throw new Error('Invalid release version');
          }
          if (
            packageJson.name !== process.env.NPM_PACKAGE
            || packageJson.version !== version
            || packageJson.mcpName !== process.env.MCP_NAME
          ) {
            throw new Error('package.json is not release-consistent');
          }
          if (
            server.name !== process.env.MCP_REGISTRY_NAME
            || server.version !== version
          ) {
            throw new Error('server.json identity is not release-consistent');
          }
          const packages = Array.isArray(server.packages) ? server.packages : [];
          const npmEntry = packages.find((entry) => entry.registryType === 'npm');
          const ociEntry = packages.find((entry) => entry.registryType === 'oci');
          if (
            !npmEntry
            || npmEntry.identifier !== process.env.NPM_PACKAGE
            || npmEntry.version !== version
            || npmEntry.transport?.type !== 'stdio'
          ) {
            throw new Error('server.json npm metadata is not release-consistent');
          }
          if (
            !ociEntry
            || ociEntry.identifier !== `${process.env.GHCR_IMAGE}:${version}`
            || ociEntry.transport?.type !== 'stdio'
          ) {
            throw new Error('server.json OCI metadata is not release-consistent');
          }
          NODE

  build:
    name: Build immutable release bundle
    needs: guard
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout release tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ needs.guard.outputs.source_sha }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24.14.0"
          package-manager-cache: false

      - name: Setup pinned Buildx and BuildKit
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
        with:
          version: v0.28.0
          driver-opts: image=moby/buildkit:v0.28.0@sha256:37539dd4d60fc70968d164d3850d903a2c56f6402214a1953fbf9fcb81ada731

      - name: Install exact toolchain and dependencies
        run: |
          set -euo pipefail
          npm install --global npm@11.15.0
          npm ci --ignore-scripts

      - name: Run release checks
        run: |
          set -euo pipefail
          npm run verify
          npm audit --audit-level=high

      - name: Build and attest each artifact once
        env:
          RELEASE_BODY_SHA256: ${{ inputs.release_body_sha256 }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          RELEASE_VERSION: ${{ needs.guard.outputs.version }}
          SOURCE_SHA: ${{ needs.guard.outputs.source_sha }}
        run: |
          set -euo pipefail
          node scripts/release-artifacts.mjs build \
            --output release-bundle \
            --tag "$RELEASE_TAG" \
            --tag-sha "$SOURCE_SHA" \
            --source-sha "$SOURCE_SHA" \
            --version "$RELEASE_VERSION" \
            --release-body-sha256 "$RELEASE_BODY_SHA256"
          node scripts/release-artifacts.mjs verify-bundle \
            --bundle release-bundle \
            --source-sha "$SOURCE_SHA" \
            --tag-sha "$SOURCE_SHA" \
            --release-body-sha256 "$RELEASE_BODY_SHA256"

      - name: Smoke the exact npm tarball
        run: |
          set -euo pipefail
          tarball="$(find release-bundle/npm -maxdepth 1 -type f -name '*.tgz' -print)"
          test -n "$tarball"
          test "$(printf '%s\n' "$tarball" | wc -l | tr -d ' ')" = "1"
          mkdir -p /tmp/videovector-mcp-tarball-smoke
          cd /tmp/videovector-mcp-tarball-smoke
          npm init -y >/dev/null
          npm install "${GITHUB_WORKSPACE}/${tarball}"
          test -x node_modules/.bin/videovector-mcp
          test -f node_modules/@vectormethods/videovector-mcp-server/dist/index.js

      - name: Smoke the exact OCI image
        run: |
          set -euo pipefail
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${GITHUB_WORKSPACE}/release-bundle:/bundle:ro" \
            "$SKOPEO_IMAGE" \
            copy --format v2s2 \
            oci-archive:/bundle/image/videovector-mcp-server.oci.tar \
            docker-daemon:videovector-mcp-release:local
          container_id="$(docker run -d -p 8080:8080 -e MCP_TRANSPORT_MODE=http videovector-mcp-release:local)"
          trap 'docker rm -f "$container_id" >/dev/null 2>&1 || true' EXIT
          healthy=0
          for _attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/health >/tmp/videovector-mcp-health.json; then
              grep -q '"status":"ok"' /tmp/videovector-mcp-health.json
              healthy=1
              break
            fi
            sleep 2
          done
          if [[ "$healthy" != "1" ]]; then
            docker logs "$container_id" >&2 || true
            exit 1
          fi

      - name: Upload immutable release bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: mcp-release-bundle
          path: release-bundle/
          if-no-files-found: error
          retention-days: 7

  publish-npm:
    name: Publish exact npm bytes
    needs:
      - guard
      - build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: npm
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout release verifier
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ needs.guard.outputs.source_sha }}

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24.14.0"
          package-manager-cache: false

      - name: Install exact npm publisher
        run: npm install --global npm@11.15.0

      - name: Download immutable release bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: mcp-release-bundle
          path: release-bundle

      - name: Classify existing npm version
        id: registry
        env:
          RELEASE_BODY_SHA256: ${{ inputs.release_body_sha256 }}
          SOURCE_SHA: ${{ needs.guard.outputs.source_sha }}
        run: |
          set -euo pipefail
          node scripts/release-artifacts.mjs verify-bundle \
            --bundle release-bundle \
            --source-sha "$SOURCE_SHA" \
            --tag-sha "$SOURCE_SHA" \
            --release-body-sha256 "$RELEASE_BODY_SHA256"
          set +e
          node scripts/release-artifacts.mjs npm-status \
            --bundle release-bundle \
            --write-missing release-bundle/publish-npm
          status="$?"
          set -e
          case "$status" in
            0) echo "publish=false" >> "$GITHUB_OUTPUT" ;;
            3) echo "publish=true" >> "$GITHUB_OUTPUT" ;;
            *) exit "$status" ;;
          esac

      - name: Publish tested npm tarball
        if: ${{ steps.registry.outputs.publish == 'true' }}
        env:
          NPM_BOOTSTRAP_TOKEN: ${{ secrets.NPM_BOOTSTRAP_TOKEN }}
        run: |
          set -euo pipefail
          tarball="$(find release-bundle/publish-npm -maxdepth 1 -type f -name '*.tgz' -print)"
          test -n "$tarball"
          if [[ -n "${NPM_BOOTSTRAP_TOKEN:-}" ]]; then
            bootstrap_userconfig="$(mktemp)"
            trap 'rm -f "$bootstrap_userconfig"' EXIT
            {
              printf 'registry=https://registry.npmjs.org/\n'
              printf '@vectormethods:registry=https://registry.npmjs.org/\n'
              printf '//registry.npmjs.org/:_authToken=%s\n' "$NPM_BOOTSTRAP_TOKEN"
              printf 'always-auth=true\n'
            } > "$bootstrap_userconfig"
            export NPM_CONFIG_USERCONFIG="$bootstrap_userconfig"
            unset NODE_AUTH_TOKEN
          fi
          npm publish "$tarball" \
            --access public \
            --provenance \
            --registry https://registry.npmjs.org/

      - name: Confirm exact npm bytes and metadata
        run: |
          set -euo pipefail
          for _attempt in $(seq 1 30); do
            set +e
            node scripts/release-artifacts.mjs npm-status --bundle release-bundle
            status="$?"
            set -e
            if [[ "$status" == "0" ]]; then
              exit 0
            fi
            if [[ "$status" != "3" ]]; then
              exit "$status"
            fi
            sleep 10
          done
          exit 1

      - name: Smoke the exact npm version
        env:
          RELEASE_VERSION: ${{ needs.guard.outputs.version }}
        run: |
          set -euo pipefail
          for _attempt in $(seq 1 18); do
            rm -rf /tmp/videovector-mcp-npm-smoke
            mkdir -p /tmp/videovector-mcp-npm-smoke
            cd /tmp/videovector-mcp-npm-smoke
            npm init -y >/dev/null
            if npm install --ignore-scripts "${NPM_PACKAGE}@${RELEASE_VERSION}"; then
              test -x node_modules/.bin/videovector-mcp
              test -f node_modules/@vectormethods/videovector-mcp-server/dist/index.js
              exit 0
            fi
            sleep 10
          done
          exit 1

  publish-ghcr:
    name: Publish exact GHCR image
    needs:
      - guard
      - build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout release verifier
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ needs.guard.outputs.source_sha }}

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24.14.0"
          package-manager-cache: false

      - name: Download immutable release bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: mcp-release-bundle
          path: release-bundle

      - name: Authenticate to GHCR
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

      - name: Classify existing image
        id: registry
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_BODY_SHA256: ${{ inputs.release_body_sha256 }}
          RELEASE_VERSION: ${{ needs.guard.outputs.version }}
          SOURCE_SHA: ${{ needs.guard.outputs.source_sha }}
        run: |
          set -euo pipefail
          node scripts/release-artifacts.mjs verify-bundle \
            --bundle release-bundle \
            --source-sha "$SOURCE_SHA" \
            --tag-sha "$SOURCE_SHA" \
            --release-body-sha256 "$RELEASE_BODY_SHA256"
          skopeo() {
            docker run --rm \
              -e REGISTRY_AUTH_FILE=/auth/config.json \
              -v "${HOME}/.docker/config.json:/auth/config.json:ro" \
              "$SKOPEO_IMAGE" "$@"
          }
          set +e
          skopeo inspect --retry-times 3 --raw \
            "docker://${GHCR_IMAGE}:${RELEASE_VERSION}" >/tmp/ghcr-raw.json
          inspect_status="$?"
          set -e
          if [[ "$inspect_status" == "0" ]]; then
            skopeo inspect --retry-times 3 --config \
              "docker://${GHCR_IMAGE}:${RELEASE_VERSION}" >/tmp/ghcr-config.json
            node scripts/release-artifacts.mjs image-status \
              --bundle release-bundle \
              --raw-manifest /tmp/ghcr-raw.json \
              --config /tmp/ghcr-config.json
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          package_name="${GHCR_IMAGE#ghcr.io/vectormethods/}"
          repository_missing=false
          versions_complete=false
          for page in $(seq 1 100); do
            status="$(curl --retry 3 --retry-all-errors -sS \
              -o /tmp/ghcr-versions.json -w '%{http_code}' \
              -H 'Accept: application/vnd.github+json' \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "https://api.github.com/orgs/${GITHUB_REPOSITORY_OWNER}/packages/container/${package_name}/versions?per_page=100&page=${page}")"
            if [[ "$page" == "1" && "$status" == "404" ]]; then
              repository_missing=true
              versions_complete=true
              break
            fi
            if [[ "$status" != "200" ]]; then
              cat /tmp/ghcr-versions.json >&2
              exit 1
            fi
            page_result="$(RELEASE_VERSION="$RELEASE_VERSION" node <<'NODE'
          const fs = require('node:fs');
          const versions = JSON.parse(fs.readFileSync('/tmp/ghcr-versions.json', 'utf8'));
          if (!Array.isArray(versions)) {
            throw new Error('GitHub Packages returned malformed version metadata');
          }
          const exists = versions.some((entry) =>
            (entry.metadata?.container?.tags ?? []).includes(process.env.RELEASE_VERSION)
          );
          process.stdout.write(exists ? 'exists' : String(versions.length));
          NODE
            )"
            if [[ "$page_result" == "exists" ]]; then
              echo "GHCR tag exists but its manifest could not be verified." >&2
              exit 1
            fi
            if (( page_result < 100 )); then
              versions_complete=true
              break
            fi
          done
          if [[ "$versions_complete" != "true" ]]; then
            echo "GHCR version census exceeded its fail-closed pagination bound." >&2
            exit 1
          fi
          if [[ "$repository_missing" != "true" ]]; then
            echo "Confirmed the target tag is absent from the existing GHCR package."
          fi
          echo "publish=true" >> "$GITHUB_OUTPUT"

      - name: Publish tested OCI archive
        if: ${{ steps.registry.outputs.publish == 'true' }}
        run: |
          set -euo pipefail
          docker run --rm \
            -e REGISTRY_AUTH_FILE=/auth/config.json \
            -v "${HOME}/.docker/config.json:/auth/config.json:ro" \
            -v "${GITHUB_WORKSPACE}/release-bundle:/bundle:ro" \
            "$SKOPEO_IMAGE" \
            copy --all --preserve-digests --retry-times 3 \
            oci-archive:/bundle/image/videovector-mcp-server.oci.tar \
            "docker://${GHCR_IMAGE}:${{ needs.guard.outputs.version }}"

      - name: Confirm exact GHCR digest and metadata
        env:
          RELEASE_VERSION: ${{ needs.guard.outputs.version }}
        run: |
          set -euo pipefail
          skopeo() {
            docker run --rm \
              -e REGISTRY_AUTH_FILE=/auth/config.json \
              -v "${HOME}/.docker/config.json:/auth/config.json:ro" \
              "$SKOPEO_IMAGE" "$@"
          }
          for _attempt in $(seq 1 18); do
            if skopeo inspect --retry-times 3 --raw \
              "docker://${GHCR_IMAGE}:${RELEASE_VERSION}" >/tmp/ghcr-raw.json &&
              skopeo inspect --retry-times 3 --config \
              "docker://${GHCR_IMAGE}:${RELEASE_VERSION}" >/tmp/ghcr-config.json &&
              node scripts/release-artifacts.mjs image-status \
                --bundle release-bundle \
                --raw-manifest /tmp/ghcr-raw.json \
                --config /tmp/ghcr-config.json; then
              exit 0
            fi
            sleep 10
          done
          exit 1

      - name: Confirm exact image is anonymously readable
        env:
          RELEASE_VERSION: ${{ needs.guard.outputs.version }}
        run: |
          set -euo pipefail
          docker run --rm "$SKOPEO_IMAGE" inspect --retry-times 3 --raw \
            "docker://${GHCR_IMAGE}:${RELEASE_VERSION}" >/tmp/ghcr-public-raw.json
          docker run --rm "$SKOPEO_IMAGE" inspect --retry-times 3 --config \
            "docker://${GHCR_IMAGE}:${RELEASE_VERSION}" >/tmp/ghcr-public-config.json
          node scripts/release-artifacts.mjs image-status \
            --bundle release-bundle \
            --raw-manifest /tmp/ghcr-public-raw.json \
            --config /tmp/ghcr-public-config.json

  publish-mcp-registry:
    name: Publish exact MCP Registry metadata
    needs:
      - guard
      - build
      - publish-npm
      - publish-ghcr
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout release verifier
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ needs.guard.outputs.source_sha }}

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24.14.0"
          package-manager-cache: false

      - name: Download immutable release bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: mcp-release-bundle
          path: release-bundle

      - name: Classify existing MCP Registry version
        id: registry
        env:
          RELEASE_BODY_SHA256: ${{ inputs.release_body_sha256 }}
          SOURCE_SHA: ${{ needs.guard.outputs.source_sha }}
        run: |
          set -euo pipefail
          node scripts/release-artifacts.mjs verify-bundle \
            --bundle release-bundle \
            --source-sha "$SOURCE_SHA" \
            --tag-sha "$SOURCE_SHA" \
            --release-body-sha256 "$RELEASE_BODY_SHA256"
          set +e
          node scripts/release-artifacts.mjs mcp-status \
            --bundle release-bundle \
            --write-missing release-bundle/publish-mcp
          status="$?"
          set -e
          case "$status" in
            0) echo "publish=false" >> "$GITHUB_OUTPUT" ;;
            3) echo "publish=true" >> "$GITHUB_OUTPUT" ;;
            *) exit "$status" ;;
          esac

      - name: Install checksum-pinned MCP publisher
        if: ${{ steps.registry.outputs.publish == 'true' }}
        run: |
          set -euo pipefail
          curl --proto '=https' --tlsv1.2 --retry 3 --retry-all-errors -fsSLo /tmp/mcp-publisher.tar.gz \
            https://github.com/modelcontextprotocol/registry/releases/download/v1.7.9/mcp-publisher_linux_amd64.tar.gz
          echo 'ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac  /tmp/mcp-publisher.tar.gz' | sha256sum --check -
          mkdir -m 0700 /tmp/mcp-publisher-bin
          tar --no-same-owner -xzf /tmp/mcp-publisher.tar.gz -C /tmp/mcp-publisher-bin mcp-publisher
          test -f /tmp/mcp-publisher-bin/mcp-publisher
          test ! -L /tmp/mcp-publisher-bin/mcp-publisher
          chmod 0755 /tmp/mcp-publisher-bin/mcp-publisher
          /tmp/mcp-publisher-bin/mcp-publisher --version

      - name: Publish tested server metadata
        if: ${{ steps.registry.outputs.publish == 'true' }}
        run: |
          set -euo pipefail
          cd release-bundle/publish-mcp
          /tmp/mcp-publisher-bin/mcp-publisher login github-oidc
          /tmp/mcp-publisher-bin/mcp-publisher publish

      - name: Confirm exact MCP Registry metadata
        run: |
          set -euo pipefail
          for _attempt in $(seq 1 30); do
            set +e
            node scripts/release-artifacts.mjs mcp-status --bundle release-bundle
            status="$?"
            set -e
            if [[ "$status" == "0" ]]; then
              exit 0
            fi
            if [[ "$status" != "3" ]]; then
              exit "$status"
            fi
            sleep 10
          done
          exit 1
