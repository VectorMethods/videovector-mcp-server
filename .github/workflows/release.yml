name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to publish, matching package.json"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-videovector-mcp-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  build:
    name: Build MCP package
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify release version
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          node - <<'NODE'
          const fs = require('node:fs');
          const version = process.env.RELEASE_VERSION;
          if (!/^[0-9]+\.[0-9]+\.[0-9]+(?:[a-z0-9.-]+)?$/.test(version)) {
            throw new Error(`Invalid release version: ${version}`);
          }
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          if (pkg.version !== version) {
            throw new Error(`package.json version ${pkg.version} does not match ${version}`);
          }
          NODE

      - name: Verify package
        run: npm run verify

      - name: Pack dry run
        run: npm pack --dry-run

  publish-npm:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: npm
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_BOOTSTRAP_TOKEN }}
        run: npm publish --access public

  create-github-release:
    name: Create GitHub release
    needs: publish-npm
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create release tag and notes
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          tag="videovector-mcp-v${RELEASE_VERSION}"
          gh release create "$tag" \
            --target "$GITHUB_SHA" \
            --title "VideoVector MCP Server ${RELEASE_VERSION}" \
            --generate-notes
